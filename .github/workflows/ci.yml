name: Selenium UI Tests CI

on:
  push:
    branches: [ "main", "master", "campaign-module" ]
  pull_request:
    branches: [ "main", "master", "campaign-module" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
      fail-fast: false

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Install Browsers
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable firefox

    - name: Run Tests
      # Test failure ignore = true diyerek raporların oluşmasını ve CI'ın zorla durmamasını sağlıyoruz.
      # %80 başarı oranı gibi metrikler bu sayede artifact JSON/HTML raporlarından incelenebilecek.
      run: xvfb-run --auto-servernum mvn clean test -Dtest=TestRunner -Dbrowser=${{ matrix.browser }} -Dmaven.test.failure.ignore=true

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: testng-results
        path: target/surefire-reports/
